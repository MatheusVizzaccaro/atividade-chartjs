<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<style>
    body {
        font-family: Arial, sans-serif;
        font-size: 16px;
    }   
    .container {
        display: flex;
        justify-content: space-evenly;
    }
    .divGrafico {
        display: flex;
        width: 40%;
        height: 40%;
        background-color: #F5F5F7;
        border: 2px solid lightgray;
        border-radius: 10px;
    }
    .titulo {
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
    }
</style>
<body>
    <div class="titulo">
        <h1>Gráficos:</h1>
        <h3>Atividade - Chart.JS</h3>
    </div>
    <div class="container">
        <div class="divGrafico">
            <canvas id="grafico1" class="grafico2"></canvas>
        </div>
        <div class="divGrafico">
            <canvas id="grafico2" class="grafico2"></canvas>
        </div>
    </div>
</body>
</html>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('grafico1');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
            datasets: [{
                label: 'Temperatura Média',
                backgroundColor: 'rgba(255, 99, 71, 0.5)',
                borderColor: 'rgb(255, 99, 71)',
                data: [30, 29, 28, 25, 22, 23],
                borderWidth: 1,
                yAxisID: 'eixoTemp',
            }, {
                label: 'Umidade Média',
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                borderColor: 'rgb(54, 162, 235)',
                data: [80, 82, 80, 85, 80, 83],
                borderWidth: 1,
                yAxisID: 'eixoUmidade'
            }]
        },
        options: {
            scales: {
                eixoTemp: {
                    position: 'left',
                    min: 0,
                    max: 50
                },
                eixoUmidade: {
                    position: 'right',
                    min: 0,
                    max: 100
                },
            }
        }
    });

    const ctx2 = document.getElementById('grafico2');
    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
            datasets: [{
                label: 'Temperatura Média',
                backgroundColor: 'rgba(255, 99, 71, 0.5)',
                borderColor: 'rgb(255, 99, 71)',
                data: [22, 24, 27, 23, 20, 18],
                borderWidth: 1,
                yAxisID: 'eixoTemp',
            }, {
                label: 'Umidade Média',
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                borderColor: 'rgb(54, 162, 235)',
                data: [90, 89, 93, 87, 88, 82],
                borderWidth: 1,
                yAxisID: 'eixoUmidade'
            }]
        },
        options: {
            scales: {
                eixoTemp: {
                    position: 'left',
                    min: 0,
                    max: 50
                },
                eixoUmidade: {
                    position: 'right',
                    min: 0,
                    max: 100
                },
            }
        }
    });
</script>
